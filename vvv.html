/*-----U_Init --------------------------------------------------------
* 
*/ 
function U_Init()
{
  G_Bag0.fSaved = (Id_Tbl0_H.innerText != "");

  if (window.opener != null) {
     /* If the current process has a father establish connection. */
     try {         
         G_Child_IPC = window.opener.G_IPC;
 
         if (G_Child_IPC["Child_1"] == null) {
            G_szNm_Child = "Child_1";
            G_Child_IPC[G_szNm_Child] = {};
            G_Child_IPC[G_szNm_Child].szResquest = "";
            G_Child_IPC[G_szNm_Child].szResponse = "connected";
         }
         else if (G_Child_IPC["Child_2"] == null) {
            G_szNm_Child = "Child_2";
            G_Child_IPC[G_szNm_Child] = {};
            G_Child_IPC[G_szNm_Child].szResquest = "";
            G_Child_IPC[G_szNm_Child].szResponse = "connected";
         }
         else {
            $Error.U_Error(C_jCd_Cur, 1, "Connection with Father failed.");
         } /* if */
     } catch (P_Err) {
         /*  Permission denied to access property "G_IPC" on cross-origin object */
     } /* try catch */       
  } /* if */

  var szURL = document.URL;
  var szParam;
